# MindForge LLM routing examples (Advanced / deployment reference).
#
# 普通用户主路径是 Web Setup + configs/mindforge_example.yaml；API key 进入
# .mindforge/secrets.json，不写 YAML。本文件仅展示需要环境变量部署、CI 或
# 多模型 routing 时的完整 YAML 形状。env var 字段是 advanced/legacy fallback。
#
# type 是 API 协议类型，不是模型品牌：
#   anthropic / anthropic_compatible / openai / openai_compatible
# If llm.routing is omitted, every workflow step uses default_model.

llm:
  default_model: strong

  models:
    cheap:
      type: openai
      api_key_env: MINDFORGE_LLM_API_KEY
      model: "gpt-4o-mini"
      timeout_seconds: 90
      max_retries: 2

    strong:
      type: anthropic_compatible
      api_key_env: MINDFORGE_LLM_API_KEY
      base_url: "https://router.example.com/anthropic"
      model: "strong-model"
      timeout_seconds: 180
      max_retries: 2

    local:
      type: openai_compatible
      api_key_env: MINDFORGE_LOCAL_API_KEY
      api_key_optional: true
      base_url: "http://localhost:11434/v1"
      model: "qwen2.5:14b"
      timeout_seconds: 240
      max_retries: 1

  routing:
    triage: cheap
    distill: strong
    link_suggestion: cheap
    review_questions: strong
    action_extraction: strong
