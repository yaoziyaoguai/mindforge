# =============================================================================
# MindForge 主配置
#
# 普通用户只需要看这一份配置。API key / secret 不要写进 YAML；
# use MINDFORGE_OPENAI_API_KEY / MINDFORGE_ANTHROPIC_API_KEY from shell env
# or local .env.
# Do not put secrets in YAML.
#
# 顶层结构：
#   vault    — Obsidian Vault 的位置与子目录约定
#   sources  — 多源接入：哪些 source_type 启用，每个对应哪个 inbox 子目录与 adapter
#   state    — MindForge 运行时产物存放位置（state.json / runs / index）
#   triage   — 分流参数（阈值、默认 track）
#   llm      — LLM Provider/Profile/Model（核心：profile + stage routing）
#   prompts  — 每个 stage 的 prompt 版本绑定
#   logging  — 日志开关与位置
# =============================================================================

version: 0.1

# -----------------------------------------------------------------------------
# Vault：Obsidian Vault 根 + inbox 子目录的统一根
# 注意：MindForge 对 inbox_root 下所有文件**只读**，永不改写、删除、重命名。
# -----------------------------------------------------------------------------
vault:
  root: "/Users/jinkun.wang/Obsidian/MyVault"
  inbox_root: "00-Inbox"            # 多源根目录；具体子目录由下面的 sources.registry 决定
  cards_dir: "20-Knowledge-Cards"   # MindForge Writer 唯一写入区
  archive_dir: "90-Archive/Skipped" # value_score 不达标的源仅记录链接到这里

# -----------------------------------------------------------------------------
# Sources：多源接入（核心抽象）
#
# - enabled    — 白名单。只有列出的 source_type 才会被 Scanner 发现并处理。
# - registry   — 每个 source_type 对应的 adapter 类、inbox 子目录、文件 glob。
#
# 学习提示：v0.1 默认只启用 cubox_markdown 与 plain_markdown。
# 其余 adapter 在 registry 里以 enabled: false 占位，仅做类型与目录约定，
# 防止以后乱放文件 / 给未来实现留住"标准位置"。
# -----------------------------------------------------------------------------
sources:
  enabled:
    - cubox_markdown
    - plain_markdown
    - webclip_markdown
    - chat_export

  registry:
    cubox_markdown:
      adapter: CuboxMarkdownAdapter
      inbox_subdir: "Cubox"
      file_glob: "*.md"
      enabled: true

    plain_markdown:
      adapter: PlainMarkdownAdapter
      inbox_subdir: "ManualNotes"
      file_glob: "*.md"
      enabled: true

    webclip_markdown:
      adapter: WebClipMarkdownAdapter
      inbox_subdir: "WebClips"
      file_glob: "*.md"
      enabled: true                  # v0.2.4 起：真实 adapter，可吃 Web Clipper / MarkDownload

    chat_export:
      adapter: ChatExportAdapter
      inbox_subdir: "ChatExports"
      file_glob: "*.md"
      enabled: true                  # v0.2.4 起：真实 adapter，可吃 ChatGPT/Claude/Copilot 导出

    obsidian_note:
      adapter: ObsidianVaultSourceAdapter
      inbox_subdir: "."
      file_glob: "*.md"
      enabled: false                 # v0.5：由 mindforge obsidian scan 只读扫描真实 vault，不走 00-Inbox 派发

    pdf:
      adapter: PdfAdapter
      inbox_subdir: "PDFs"
      file_glob: "*.pdf"
      enabled: false                 # 默认 OFF：需要 ``pip install 'mindforge[pdf]'`` 后再开启（详见 README.md）

    docx:
      adapter: DocxAdapter
      inbox_subdir: "Docs"
      file_glob: "*.docx"
      enabled: false                 # 默认 OFF：需要 ``pip install 'mindforge[docx]'`` 后再开启

# -----------------------------------------------------------------------------
# 状态与日志
# -----------------------------------------------------------------------------
state:
  workdir: ".mindforge"             # 相对 MindForge 项目根（不在 vault 内）
  state_file: "state.json"
  runs_dir: "runs"
  index_file: "index.jsonl"
  backup_state: true                # 每次写入前生成 state.json.bak

# -----------------------------------------------------------------------------
# Obsidian Binding（v0.5）— 把真实 Obsidian vault 当作只读 Source。
#
# 这不是 Obsidian plugin，也不是 RAG/vector/graph。MindForge 第一阶段只扫描
# Markdown 语境，不改正式 notes，不移动文件，不重写双链。生成候选内容只能写入
# staging/review；机器 state/cache/index/logs 继续留在 .mindforge 或派生层。
# -----------------------------------------------------------------------------
obsidian:
  vault_path: ""
  staging_dir: "90-System/MindForge/Staging"
  review_dir: "90-System/MindForge/Review"
  include_dirs:
    - "00-Inbox"
    - "02-Knowledge"
    - "03-Projects"
  exclude_dirs:
    - ".obsidian"
    - ".git"
    - ".mindforge"
    - "90-System/MindForge/Runtime"
  read_only: true

# -----------------------------------------------------------------------------
# Triage 参数
# -----------------------------------------------------------------------------
triage:
  value_score_threshold: 5          # < 5 直接 skipped
  default_track: "unrouted"

# -----------------------------------------------------------------------------
# LLM 配置（核心）
#
# 三层：
#   active_profile  — 选择当前生效的 profile。真实 dogfood 主路径可以使用
#                     openai_compatible 或 anthropic；fake 只给 offline demo /
#                     CI / deterministic tests。
#   profiles        — 每个 profile = "stage → model_alias" 映射
#   models          — 每个 model_alias 的具体 provider 配置
#
# 设计原则：
#   - 配置层面开放：你可以列任意多个 profile / model；
#   - 执行层面克制：只做 active_profile 里声明的静态 stage→alias 映射；
#   - 不做 fallback / 投票 / 动态路由 / token-aware routing。
#
# 同一 provider 下允许多个 model（如 cheap_cloud / strong_cloud）。
# -----------------------------------------------------------------------------
llm:
  # 真实 dogfood 默认：watch/import/process 会使用这个 profile。
  # 可改成 anthropic。缺少对应 API key 时命令会友好失败，不会 fallback 到 fake。
  active_profile: openai_compatible

  profiles:
    # —— 内部测试路径：offline demo / CI / deterministic tests ——
    fake:
      triage: fake_fast
      distill: fake_strong
      link_suggestion: fake_fast
      review_questions: fake_strong
      action_extraction: fake_strong

    # —— 真实主路径：阿里云 DashScope Coding Plan（Anthropic-compatible 协议）——
    # 显式切换后才会生效；base_url / api_key 一律从 .env 读取。
    anthropic_coding_plan:
      triage: qwen_coder_fast
      distill: qwen_coder_strong
      link_suggestion: qwen_coder_fast
      review_questions: qwen_coder_strong
      action_extraction: qwen_coder_strong

    # —— 真实主路径：Anthropic-compatible / Claude ——
    # secret 只通过 MINDFORGE_ANTHROPIC_API_KEY 提供；base_url/model 可用 env 覆盖。
    anthropic:
      triage: anthropic_fast
      distill: anthropic_strong
      link_suggestion: anthropic_fast
      review_questions: anthropic_strong
      action_extraction: anthropic_strong

    # —— 真实主路径：OpenAI-compatible 云端（OpenAI 官方 / 自建网关）——
    # secret 只通过 MINDFORGE_OPENAI_API_KEY 提供；base_url 可选。
    openai_compatible:
      triage: openai_fast
      distill: openai_strong
      link_suggestion: openai_fast
      review_questions: openai_strong
      action_extraction: openai_strong

    # —— 备选：本地 Ollama / LM Studio 完全离线（仍走 OpenAI-compatible 协议）——
    all_local:
      triage: local_fast
      distill: local_strong
      link_suggestion: local_fast
      review_questions: local_strong
      action_extraction: local_strong

  models:
    # —— fake：offline demo / CI / deterministic tests，不是普通用户真实主路径 ——
    fake_fast:
      provider: fake
      type: fake
      model: fake-fast

    fake_strong:
      provider: fake
      type: fake
      model: fake-strong

    # —— DashScope Anthropic-compatible：通过 .env 注入 base_url / api_key；
    # 模型名内置稳妥默认，并允许通过 model_env 覆盖（同 endpoint 切 fast/strong）。
    qwen_coder_fast:
      provider: dashscope_coding_plan
      type: anthropic_compatible
      base_url_env: MINDFORGE_LLM_BASE_URL
      api_key_env: MINDFORGE_LLM_API_KEY
      version_env: MINDFORGE_LLM_VERSION
      model_env: MINDFORGE_LLM_MODEL_FAST    # 可选：覆盖默认 fast 模型
      model: "qwen3-coder-next"
      timeout_seconds: 180
      max_retries: 2

    qwen_coder_strong:
      provider: dashscope_coding_plan
      type: anthropic_compatible
      base_url_env: MINDFORGE_LLM_BASE_URL
      api_key_env: MINDFORGE_LLM_API_KEY
      version_env: MINDFORGE_LLM_VERSION
      model_env: MINDFORGE_LLM_MODEL_STRONG  # 可选：覆盖默认 strong 模型
      model: "qwen3-coder-plus"
      timeout_seconds: 240
      max_retries: 2

    # —— Anthropic-compatible / Claude：env 变量名映射 + 非 secret 默认值 ——
    anthropic_fast:
      provider: anthropic
      type: anthropic_compatible
      base_url_env: MINDFORGE_ANTHROPIC_BASE_URL
      base_url: "https://api.anthropic.com"
      api_key_env: MINDFORGE_ANTHROPIC_API_KEY
      model_env: MINDFORGE_ANTHROPIC_MODEL
      model: "claude-3-5-haiku-latest"
      timeout_seconds: 120
      max_retries: 2

    anthropic_strong:
      provider: anthropic
      type: anthropic_compatible
      base_url_env: MINDFORGE_ANTHROPIC_BASE_URL
      base_url: "https://api.anthropic.com"
      api_key_env: MINDFORGE_ANTHROPIC_API_KEY
      model_env: MINDFORGE_ANTHROPIC_MODEL
      model: "claude-3-5-haiku-latest"
      timeout_seconds: 240
      max_retries: 2

    # —— OpenAI-compatible 云端 ——
    openai_fast:
      provider: openai_compatible
      type: openai_compatible
      base_url_env: MINDFORGE_OPENAI_BASE_URL
      base_url: "https://api.openai.com/v1"
      api_key_env: MINDFORGE_OPENAI_API_KEY
      model_env: MINDFORGE_OPENAI_MODEL
      model: "gpt-4o-mini"
      timeout_seconds: 120
      max_retries: 2

    openai_strong:
      provider: openai_compatible
      type: openai_compatible
      base_url_env: MINDFORGE_OPENAI_BASE_URL
      base_url: "https://api.openai.com/v1"
      api_key_env: MINDFORGE_OPENAI_API_KEY
      model_env: MINDFORGE_OPENAI_MODEL
      model: "gpt-4o-mini"
      timeout_seconds: 240
      max_retries: 2

    # —— 本地 Ollama / LM Studio（OpenAI-compatible 协议；api_key 可选）——
    local_fast:
      provider: local_ollama
      type: openai_compatible
      base_url_env: MINDFORGE_LOCAL_LLM_BASE_URL
      api_key_env: MINDFORGE_LOCAL_LLM_API_KEY
      api_key_optional: true
      base_url: "http://localhost:11434/v1"   # base_url_env 缺失时的兜底
      model: "qwen2.5:7b"
      timeout_seconds: 120
      max_retries: 1

    local_strong:
      provider: local_ollama
      type: openai_compatible
      base_url_env: MINDFORGE_LOCAL_LLM_BASE_URL
      api_key_env: MINDFORGE_LOCAL_LLM_API_KEY
      api_key_optional: true
      base_url: "http://localhost:11434/v1"
      model: "qwen2.5:14b"
      timeout_seconds: 240
      max_retries: 1

# -----------------------------------------------------------------------------
# Prompts：每个 stage 当前使用哪个版本
# 文件路径：prompts/<stage>/<version>.md
# manifest:  prompts/<stage>/manifest.yaml
# 改 prompt 必须新增 vN+1，**不可覆盖** vN，以保证回放一致性。
# -----------------------------------------------------------------------------
prompts:
  triage_version: "v1"
  distill_version: "v1"
  link_suggestion_version: "v1"
  review_questions_version: "v1"
  action_extraction_version: "v1"

# -----------------------------------------------------------------------------
# Strategy：知识抽取/卡片组织策略
#
# 中文学习型说明：strategy.active 与 llm.active 是两条正交轴：
# - strategy.active 选择“如何抽取知识、如何组织 card envelope”；
# - llm.active 选择“如果该 strategy 需要模型，使用哪个 provider/model”。
# 默认 five_stage 保持现有主链路；deterministic strategy 可通过
# --strategy 临时覆盖或在项目配置里显式选择。
# -----------------------------------------------------------------------------
strategy:
  active: "five_stage"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  file: ".mindforge/mindforge.log"
  record_prompts: true              # 是否在 runs/*.jsonl 里写 prompt 文本
  record_outputs: true              # 是否在 runs/*.jsonl 里写 LLM 原始输出

# -----------------------------------------------------------------------------
# Telemetry（M5.7 / v0.2.3）— 本地使用观察日志，**永不上传**。
#
# - enabled: false 时整个 telemetry 模块静默；
# - local_only: v0.2.3 固定 true；任何远程 sink 都需要先扩协议；
# - 写入位置：<state.workdir>/telemetry.jsonl（默认 .mindforge/telemetry.jsonl）；
# - 字段白名单：见 README.md，绝不写卡片正文 / prompt /
#   completion / api_key / .env / 全绝对私有路径。
# -----------------------------------------------------------------------------
telemetry:
  enabled: true
  local_only: true

# -----------------------------------------------------------------------------
# Search（v0.3.1）— BM25 词法检索 + hybrid 排序。**纯本地规则**，不是 RAG。
#
# bm25.fields 用"用户友好别名 → 权重"配置；解析为内部 field 名见 USER_FIELD_ALIASES。
#   - learning_tracks → 内部 track；summary → body_summary；action_items → body_actions
#   - 权重 == 0 表示该字段不参与 BM25 打分
#   - 不在 fields 中显式声明的字段，使用 DEFAULT_FIELD_WEIGHTS
#
# hybrid 在 BM25 基础上叠加两路本地信号：
#   - value_score：卡片 frontmatter 中的 0~10 分，归一到 [0,1]
#   - review_due ：基于 review_after 的 30 天衰减窗口
# weights 三路相加之和不强制为 1，权重大小决定影响占比。
# -----------------------------------------------------------------------------
search:
  bm25:
    enabled: true
    k1: 1.5
    b: 0.75
    default_limit: 10
    fields:
      title: 5.0
      learning_tracks: 4.0
      projects: 4.0
      tags: 3.0
      summary: 1.0
      action_items: 1.0
  hybrid:
    enabled: true
    weights:
      bm25: 0.75
      value_score: 0.15
      review_due: 0.10

# -----------------------------------------------------------------------------
# Advanced / Troubleshooting
#
# 普通用户主路径是:
#   mindforge watch add <file-or-folder> --profile openai_compatible
#   mindforge import <file-or-folder> --profile openai_compatible
#   mindforge approve
#   mindforge recall --query "..."
#
# scan/process 仍保留给 Advanced / Troubleshooting。fake provider 继续保留给
# offline demo / CI / deterministic tests:
#   mindforge process --profile fake --limit 1
# -----------------------------------------------------------------------------
