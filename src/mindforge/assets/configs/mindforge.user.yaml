# MindForge user config.
#
# Most users configure models via Web Setup (http://127.0.0.1:8765/setup).
# API keys are stored in local secret store (.mindforge/secrets.json, gitignored).
# Do not put API keys in this YAML.
#
# This file is a user-level override. MindForge keeps source registry,
# state/index paths, prompt versions, search defaults, and other runtime details
# as internal package defaults, then merges this file on top at runtime.

version: 0.1

vault:
  root: "/Users/jinkun.wang/MindForgeVault"

llm:
  # model id chosen from llm.models keys.
  default_model: main

  models:
    main:
      type: openai_compatible
      base_url: "https://your-router.example.com/v1"
      model: "your-model-name"

  # Optional. If omitted, all workflow steps use default_model.
  routing:
    triage: main
    distill: main
    link_suggestion: main
    review_questions: main
    action_extraction: main

telemetry:
  enabled: true
  local_only: true
