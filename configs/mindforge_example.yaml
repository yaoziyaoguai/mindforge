# MindForge 示例配置 —— 新用户参考模板（git-tracked）。
#
# 此文件仅作为参考模板，不要直接修改。
# 实际配置：
#   - Web Setup 写入到 configs/mindforge.yaml（本地运行时配置，已 gitignore）
#   - API key 通过 Web Setup 的 Add model 输入，保存在 .mindforge/secrets.json（已 gitignore）
#
# 推荐路径：
#   启动 mindforge web → Setup → Add model，在界面中配置模型。
#   不需要手动编辑 YAML 或设置环境变量。
#
# 安全性：
#   - API key 不写 YAML
#   - .mindforge/secrets.json 被 .gitignore 排除，不要提交
#   - configs/mindforge.yaml 被 .gitignore 排除，不要提交
#   - wiki.model 和 routing 的值只能引用 llm.models 中已有的 model id

version: 0.7

vault:
  root: "vault"

# -----------------------------------------------------------------------------
# LLM 模型配置
# type 是 API 协议类型，支持：anthropic, anthropic_compatible, openai, openai_compatible
# -----------------------------------------------------------------------------
llm:
  default_model: main

  models:
    main:
      type: anthropic_compatible
      base_url: "https://your-provider.example.com"
      model: "your-model-name"
      timeout_seconds: 240
      max_retries: 2

  routing:
    triage: main
    distill: main
    link_suggestion: main
    review_questions: main
    action_extraction: main

# -----------------------------------------------------------------------------
# Wiki 配置（可选）
# mode: deterministic（无需 LLM，按模板拼接）或 llm（LLM 综合归纳）
# -----------------------------------------------------------------------------
wiki:
  mode: deterministic
  model: main
  auto_rebuild_on_approve: false

# -----------------------------------------------------------------------------
# 遥测（不上传，纯本地统计）
# -----------------------------------------------------------------------------
telemetry:
  enabled: true
  local_only: true
