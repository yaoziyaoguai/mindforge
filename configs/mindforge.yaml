# MindForge user config.
#
# 推荐路径：通过 Web Setup (mindforge web → Setup) 配置模型。
# API key 通过 Add model 填写，保存在 local secret store (.mindforge/secrets.json)。
# YAML 只保存非 secret 的 model metadata。
#
# 完整示例参考 configs/mindforge_example.yaml。
#
# 本文件是 user-level override。MindForge 保留 source registry/prompt versions/
# search defaults 等内置默认值，运行时 merge 此文件。

version: 0.1

vault:
  root: "vault"
  inbox_root: 00-Inbox
  cards_dir: 20-Knowledge-Cards
  archive_dir: 90-Archive/Skipped

# ---------------------------------------------------------------------------
# LLM 模型配置
# 首次安装后没有预置模型。在 Web Setup 中 Add model 来配置。
# type: anthropic / anthropic_compatible / openai / openai_compatible
# ---------------------------------------------------------------------------
llm:
  default_model: null
  models: {}
  routing: {}

# ---------------------------------------------------------------------------
# Wiki 配置
# ---------------------------------------------------------------------------
wiki:
  mode: deterministic          # deterministic | llm
  model: null                  # 引用 llm.models 中的 model id
  auto_rebuild_on_approve: false

# ---------------------------------------------------------------------------
# Prompt 版本
# ---------------------------------------------------------------------------
prompts:
  triage_version: "v1"
  distill_version: "v1"
  link_suggestion_version: "v1"
  review_questions_version: "v1"
  action_extraction_version: "v1"

# ---------------------------------------------------------------------------
# 日志
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  file: ".mindforge/mindforge.log"
  record_prompts: true
  record_outputs: true

# ---------------------------------------------------------------------------
# 本地遥测（不上传）
# ---------------------------------------------------------------------------
telemetry:
  enabled: true
  local_only: true

# ---------------------------------------------------------------------------
# 本地词法检索
# ---------------------------------------------------------------------------
search:
  bm25:
    enabled: true
    k1: 1.5
    b: 0.75
    default_limit: 10
    fields:
      title: 5.0
      learning_tracks: 4.0
      projects: 4.0
      tags: 3.0
      summary: 1.0
      action_items: 1.0
  hybrid:
    enabled: true
    weights:
      bm25: 0.75
      value_score: 0.15
      review_due: 0.10
