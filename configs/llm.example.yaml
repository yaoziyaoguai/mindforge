# MindForge LLM routing examples.
#
# Most users only need one model in configs/mindforge.yaml:
#
# llm:
#   default_model: main
#   models:
#     main:
#       type: openai_compatible
#       api_key_env: MINDFORGE_LLM_API_KEY
#       base_url: "https://your-router.example.com/v1"
#       model: "your-model-name"
#
# If llm.routing is omitted, every workflow step uses default_model.

llm:
  default_model: strong

  models:
    cheap:
      type: openai_compatible
      api_key_env: MINDFORGE_LLM_API_KEY
      base_url: "https://router.example.com/v1"
      model: "cheap-model"
      timeout_seconds: 90
      max_retries: 2

    strong:
      type: anthropic_compatible
      api_key_env: MINDFORGE_LLM_API_KEY
      base_url: "https://router.example.com/anthropic"
      model: "strong-model"
      timeout_seconds: 180
      max_retries: 2

    local:
      type: openai_compatible
      api_key_env: MINDFORGE_LOCAL_API_KEY
      api_key_optional: true
      base_url: "http://localhost:11434/v1"
      model: "qwen2.5:14b"
      timeout_seconds: 240
      max_retries: 1

  routing:
    triage: cheap
    distill: strong
    link_suggestion: cheap
    review_questions: strong
    action_extraction: strong
